apiVersion: v3.1.0
kind: DataContract
id: alfred.calendar.standard
name: Calendar — standard
version: 1.0.0
status: active
domain: productivity
description:
  purpose: ODCS view of upcoming calendar events.
  usage: Consumed by Alfred to reason about meeting requests.
schema:
  - name: events
    logicalType: object
    physicalName: events
    properties:
      - name: event_id
        logicalType: string
        required: true
      - name: title
        logicalType: string
        required: true
      - name: start
        logicalType: date
        required: true
      - name: end
        logicalType: date
        required: true
      - name: attendees
        logicalType: integer
        required: false
      - name: organizer
        logicalType: string
        required: false
