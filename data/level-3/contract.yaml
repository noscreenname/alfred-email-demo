# ============================================================
# ODCS Data Contract — Inbox Intelligence Product
# Version: 2.0
# Owner: data-platform-team
# Status: active
# Last updated: 2026-04-22
# ============================================================
#
# This contract describes what the data IS, what you can TRUST,
# what the limitations ARE, and how to USE each field for
# email classification. It is the single source of truth for
# any consumer of this product.
# ============================================================

contract:
  name: "Inbox Intelligence Product"
  version: "2.0"
  status: active

  owner:
    team: data-platform-team
    contact: data-platform@internal-team.com
    escalation: "Slack #data-platform-support"

  description: >
    Curated email threads enriched with cross-source context from
    Google Calendar and Trello. Each thread includes a cleaned body,
    a classified sender, joined task and calendar relationships, and
    derived action signals. Built from three raw sources via the
    build_product.py pipeline.

  sources:
    - name: Gmail
      type: email
      access: "Gmail API via MCP"
      scope: "Primary inbox, last 7 days, up to 50 threads"
      note: "Full message bodies fetched for threads where available"

    - name: Google Calendar
      type: calendar
      access: "Calendar API via MCP"
      scope: "Primary calendar, 7-day window around current date"

    - name: Trello
      type: task_management
      access: "Trello REST API"
      scope: "All cards from open boards"
      note: "No CRM source available. Sender relationships are inferred from email domain patterns, not from a CRM system."

  lifecycle:
    created: "2026-04-22"
    last_reviewed: "2026-04-22"
    next_review: "2026-07-22"
    deprecation_notice: null
    breaking_changes: >
      v2.0 replaced mock data with real data pipeline.
      Fields sender.deal_stage, sender.deal_value, sender.deal_owner
      removed (no CRM source). Sender classification now based on
      domain heuristics instead of CRM sync.

  freshness:
    sla_minutes: 60
    instruction: >
      This product is regenerated by running build_product.py against
      fresh API dumps. If generated_at in the product metadata is older
      than 60 minutes, the data may not reflect recent emails, calendar
      changes, or task updates. Note the data age in any time-sensitive
      classification.

# ============================================================
# SCHEMA — what each field IS
# ============================================================

schema:
  product_metadata:
    - name: product.name
      type: string
      description: "Product identifier"
      example: "Inbox Intelligence Product"

    - name: product.generated_at
      type: datetime
      description: "ISO 8601 timestamp when this product was built"
      nullable: false
      use: "Compare against current time to assess data freshness"

    - name: product.source_data
      type: object
      description: "Counts of raw records ingested from each source"
      fields:
        gmail_threads: "Number of email threads processed"
        calendar_events: "Number of calendar events loaded"
        trello_cards: "Number of Trello cards loaded"

  thread:
    - name: thread_id
      type: string
      description: "Gmail thread identifier. Unique within this product."
      nullable: false

    - name: subject
      type: string
      description: "Subject line of the latest message in the thread"
      nullable: false

    - name: date
      type: datetime
      description: "Timestamp of the latest message (ISO 8601, UTC)"
      nullable: false
      use: "Use for recency sorting and time-period filtering"

    - name: snippet
      type: string
      description: "First ~200 characters of the latest message. Always present."
      nullable: false
      use: "Quick preview. Use body for full classification context."

    - name: body
      type: string
      description: >
        Full plaintext body of the latest message, cleaned by the pipeline.
        Tracking URLs, HTML artifacts, unsubscribe footers, and link wrappers
        have been stripped. May be empty if the raw source had no plaintext body.
      nullable: false
      cleaning_applied:
        - "URLs longer than 80 characters removed (tracking links)"
        - "Markdown-style link wrappers [https://...] removed"
        - "Unsubscribe/désabonner lines removed"
        - "Email footers after separator lines (---) removed"
        - "Consecutive blank lines collapsed"
      use: >
        Primary content for classification. If body is empty or very short
        (word_count < 10), fall back to snippet for classification.

    - name: is_unread
      type: boolean
      description: "Whether the thread is marked as unread in Gmail"
      nullable: false
      reliability: >
        Reflects Gmail state at fetch time. May not be accurate if the user
        read the email between the fetch and the agent run.

  sender:
    - name: sender.name
      type: string
      description: >
        Human-readable sender name. Derived from the email address local part
        when no display name is available (e.g., "Do Not Reply" from
        "do-not-reply@trello.com"). May not reflect the sender's actual name.
      nullable: false
      reliability: "Low for automated senders. High for person senders."

    - name: sender.email
      type: string
      description: "Full email address of the sender"
      nullable: false

    - name: sender.type
      type: enum
      values: [person, automated, newsletter, transactional]
      description: >
        Classification of the sender based on email domain heuristics.
        NOT derived from a CRM or verified contact database.
      nullable: false
      provenance: domain_heuristic
      definitions:
        person: >
          Sender appears to be an individual human. Classified by exclusion:
          not matched by any automated, newsletter, or transactional pattern.
          WARNING: Some person-classified senders may actually be automated
          (e.g., personal-looking emails from marketing tools). When in doubt,
          check the body content for template language.
        automated: >
          Sender is a system or platform notification. Matched by domain
          patterns: noreply@, no-reply@, notifications@, @accounts.google.com,
          @github.com, or domains containing "luma-mail", "calendar", "engage",
          "feedback".
        newsletter: >
          Sender is a known newsletter or content digest. Matched against a
          curated list of newsletter sender addresses. May be incomplete —
          new newsletters not in the list will be classified as "person".
        transactional: >
          Sender is a known transactional/receipt sender (e-commerce, travel,
          banking). Matched against a curated list. Examples: Bolt receipts,
          SNCF confirmations, Eurostar tickets, booking confirmations.
      known_limitations:
        - "No CRM data: cannot determine if sender is a client, partner, or prospect"
        - "Heuristic-based: new automated senders not in patterns will be misclassified as person"
        - "Newsletter list is manually maintained and may be incomplete"

  contact_intelligence:
    - name: contact_intelligence.total_messages_1yr
      type: integer
      description: "Total Gmail threads from this sender in the past 365 days"
      nullable: false
      provenance: gmail_search
      use: >
        Primary relationship strength signal. Higher = more important relationship.
        Capped at 50 (Gmail API page limit) — senders showing 50 may have more.

    - name: contact_intelligence.first_exchange
      type: datetime
      description: "Date of earliest thread from this sender in the 1-year window"
      nullable: true
      use: "How long you've been in contact. Null if no history found."

    - name: contact_intelligence.last_exchange
      type: datetime
      description: "Date of most recent thread from this sender"
      nullable: true
      use: "Recency of relationship. Recent = active relationship."

    - name: contact_intelligence.intensity
      type: enum
      values: [frequent, regular, occasional, rare]
      description: >
        Relationship intensity derived from total_messages_1yr:
        frequent (≥20/yr), regular (5-19/yr), occasional (2-4/yr), rare (1/yr or less)
      nullable: false
      use: >
        KEY CLASSIFICATION SIGNAL. Intensity directly correlates with sender
        importance. A 'frequent' sender's emails deserve more attention than
        a 'rare' sender, even if the email content looks similar.
      classification_rules:
        - "frequent + person → almost always require_action or informatif, never notification"
        - "regular + person + has_action_signal → require_action (high confidence)"
        - "rare + person → treat with caution, may be important first contact or spam"
        - "frequent + automated → regular service the user relies on (informatif, not notification)"

    - name: contact_intelligence.is_known_sender
      type: boolean
      description: "True if sender has any Gmail history in the past year"
      nullable: false
      use: >
        Unknown senders (is_known_sender == false) with substantive content
        may be new contacts worth attention. Unknown senders with short/template
        content are likely spam or cold outreach.

  cross_source:
    - name: cross_source.related_tasks
      type: array[object]
      description: >
        Trello cards that match this email thread by keyword overlap.
        The pipeline extracts words (4+ characters) from the sender name,
        sender email, and email subject, then matches against Trello card names.
      nullable: true
      provenance: keyword_matching
      matching_method: >
        Words of 4+ characters from (sender_name + subject) are compared
        against words of 4+ characters from each Trello card name.
        A match requires at least one overlapping word.
      fields:
        - name: task_name
          type: string
          description: "Trello card title"
        - name: list
          type: enum
          values: [TODO, Backlog, Admin, Ideation, Writing, Code, Buy, Fridge]
          description: "Which Trello list the card is in"
          use: >
            Cards in TODO or Backlog are active work. Cards in Fridge are
            parked ideas. Weight the relevance of a task match by its list:
            TODO > Backlog > Code > Writing > Ideation > Admin > Buy > Fridge.
        - name: due
          type: date
          description: "Due date if set. Null if no due date."
          nullable: true
        - name: overdue
          type: boolean
          description: "True if due date has passed"
        - name: match_reason
          type: string
          description: "Which keywords triggered the match"
          use: >
            Review the match_reason to assess relevance. Single common-word
            matches (e.g., "service") are likely false positives. Multi-word
            or specific-term matches are more reliable.
      known_limitations:
        - "Keyword matching produces false positives — common words like 'service', 'data', 'read' match many cards"
        - "No semantic understanding — 'conference talk prep' won't match an email about 'preparing the presentation'"
        - "Only matches against card names, not card descriptions"
      quality_rule: >
        If a thread has more than 3 related_tasks, the matches are likely
        noise from common keywords. Treat as if no related tasks exist.

    - name: cross_source.calendar_conflicts
      type: array[object]
      description: >
        Calendar events that may overlap with times mentioned in the email.
        Detected by scanning the subject and body for time/day mentions,
        then listing calendar events from the same period.
      nullable: true
      provenance: heuristic_time_extraction
      fields:
        - name: event_name
          type: string
          description: "Calendar event title"
        - name: start
          type: datetime
          description: "Event start time"
        - name: end
          type: datetime
          description: "Event end time"
        - name: conflict_type
          type: string
          description: "Always 'potential_overlap' — exact conflict detection not implemented"
      known_limitations:
        - "Time extraction is regex-based, not NLP — may miss natural language time references"
        - "All conflicts are 'potential_overlap' — no actual time comparison is performed"
        - "If email mentions any time or day, ALL calendar events are returned as potential conflicts (max 3)"
        - "This field has HIGH false positive rate — use as a signal to investigate, not as ground truth"
      quality_rule: >
        Calendar conflicts are unreliable in v2.0. If present, mention the
        potential conflict but do NOT treat it as confirmed. Suggest the user
        verify their calendar.

    - name: cross_source.sender_history_7d
      type: integer
      description: >
        Number of threads in the current 7-day dataset from the same sender.
        Use contact_intelligence.total_messages_1yr for the full picture.
      nullable: false
      use: "Short-term frequency. Use contact_intelligence.intensity for relationship assessment."

  derived:
    - name: derived.has_action_signal
      type: boolean
      description: >
        True if the subject or cleaned body contains patterns indicating
        the recipient needs to take action: questions, deadlines, requests
        to respond, sign, approve, or review.
      nullable: false
      provenance: regex_pattern_matching
      patterns_checked:
        - "Questions: 'could you', 'can you', 'would you', 'please'"
        - "Deadlines: 'deadline', 'due date', 'by end of', 'avant le'"
        - "Urgency: 'urgent', 'asap', 'as soon as possible'"
        - "Actions: 'sign', 'approve', 'review', 'respond', 'reply'"
        - "Question marks at end of line"
      known_limitations:
        - "Template emails from automated senders often contain action words ('click here to review') — produces false positives when sender.type != 'person'"
        - "Bilingual coverage: French and English patterns included, but other languages may be missed"
      quality_rule: >
        has_action_signal is most reliable when sender.type == 'person'.
        When sender.type is 'automated' or 'transactional' and has_action_signal
        is true, the signal is likely a template — demote to Notification.

    - name: derived.has_related_task
      type: boolean
      description: "True if related_tasks array is non-empty"
      nullable: false
      use: "Shortcut flag. Check related_tasks for details and match quality."

    - name: derived.has_calendar_conflict
      type: boolean
      description: "True if calendar_conflicts array is non-empty"
      nullable: false
      use: >
        Shortcut flag. WARNING: high false positive rate (see calendar_conflicts
        known_limitations). Do not use as sole basis for flagging conflicts.

    - name: derived.is_significant_sender
      type: boolean
      description: "True if contact_intelligence.intensity is 'frequent' or 'regular'"
      nullable: false
      use: >
        KEY derived signal. Significant senders have an established relationship.
        Their emails should be weighted toward require_action or informatif,
        almost never notification (unless sender.type is transactional).

    - name: derived.word_count
      type: integer
      description: "Word count of the cleaned body"
      nullable: false
      use: >
        Proxy for email substance. word_count < 10 indicates the body was
        mostly noise (tracking links, HTML) and was stripped by cleaning.
        Fall back to snippet for classification in these cases.
        word_count > 200 indicates a substantive email that may need
        careful reading.

# ============================================================
# QUALITY RULES — what you can TRUST
# ============================================================

quality_rules:
  - rule: "thread_id is unique and non-null"
    severity: critical

  - rule: "sender.email is non-null for every thread"
    severity: critical

  - rule: "sender.type is always one of: person, automated, newsletter, transactional"
    severity: critical

  - rule: "date is valid ISO 8601 UTC"
    severity: high

  - rule: "body is cleaned — no tracking URLs > 80 chars, no unsubscribe footers"
    severity: high

  - rule: "derived.has_action_signal is consistent with patterns_checked"
    severity: medium

  - rule: "related_tasks match_reason explains why the match was made"
    severity: medium

  - rule: "calendar_conflicts limited to max 3 per thread"
    severity: low

# ============================================================
# CLASSIFICATION GUIDANCE — how to USE this data
# ============================================================

classification_guidance:
  purpose: >
    These rules help the agent classify emails into Require Action,
    Informatif, or Notification. They encode domain knowledge that
    the agent cannot derive from the data alone. When multiple rules
    conflict, prefer the higher-attention category.

  require_action:
    strong_signals:
      - condition: "sender.type == 'person' AND has_action_signal == true"
        confidence: high
        reasoning: "A real person is asking something — this almost always requires action"

      - condition: "has_related_task == true AND related_tasks[].list == 'TODO' AND related_tasks[].overdue == true"
        confidence: high
        reasoning: "Email relates to an overdue task — needs attention"

      - condition: "is_significant_sender == true AND sender.type == 'person' AND has_action_signal == true"
        confidence: high
        reasoning: "Established relationship + person + action signal = definite action needed"

    moderate_signals:
      - condition: "is_significant_sender == true AND sender.type == 'person'"
        confidence: medium
        reasoning: "Frequent/regular correspondent — their emails usually matter"

      - condition: "subject contains 'signer' OR 'signature' OR 'sign'"
        confidence: medium
        reasoning: "Document signing requests require action regardless of sender type"

      - condition: "contact_intelligence.intensity == 'rare' AND sender.type == 'person' AND word_count > 50"
        confidence: medium
        reasoning: "Rare sender writing a substantive email — could be important new contact or re-engagement"

    weak_signals:
      - condition: "has_calendar_conflict == true"
        confidence: low
        reasoning: "Calendar conflict detection is unreliable (see known_limitations). Flag for user attention but don't rely on it."

  informatif:
    signals:
      - condition: "sender.type == 'person' AND has_action_signal == false"
        reasoning: "Person sending FYI-type content — worth reading, no action needed"

      - condition: "sender.type == 'newsletter'"
        reasoning: "Subscribed newsletter — user chose to receive this"

      - condition: "has_related_task == true AND related_tasks[].list in ['Ideation', 'Fridge']"
        reasoning: "Email relates to a parked idea or future plan — informational context"

      - condition: "sender_history == 1 AND sender.type == 'person' AND word_count > 50"
        reasoning: "Substantive first-time email from a person — worth reading even without action signal"

  notification:
    signals:
      - condition: "sender.type == 'automated'"
        reasoning: "System notification — low priority unless has_action_signal triggers for a person-type reason"

      - condition: "sender.type == 'transactional'"
        reasoning: "Receipt, confirmation, or shipping update — file and forget"

      - condition: "sender.type == 'automated' AND has_action_signal == true"
        override: "Demote to Notification despite action signal"
        reasoning: "Action words in automated emails are almost always template language ('click here to review'), not genuine requests"

      - condition: "word_count < 10 AND sender.type != 'person'"
        reasoning: "Email was mostly noise (tracking links stripped). No substance to classify."

  edge_cases:
    - scenario: "related_tasks has > 3 matches"
      instruction: "Treat as no related tasks — the matches are keyword noise"

    - scenario: "body is empty but snippet contains action language"
      instruction: "Classify based on snippet + sender.type. Note that body was unavailable."

    - scenario: "sender.type == 'person' but email domain suggests automated (e.g., marketing tool)"
      instruction: "The heuristic may have missed it. Check body for template patterns before classifying as Require Action."

# ============================================================
# KNOWN GAPS — what is NOT in this data
# ============================================================

known_gaps:
  - gap: "No CRM data"
    impact: >
      Cannot determine if a sender is a client, prospect, or partner.
      Cannot see deal stage, deal value, or account owner.
    workaround: >
      contact_intelligence provides relationship signals: intensity, message
      volume, and exchange history over 1 year. Use is_significant_sender
      as a proxy for important relationships.

  - gap: "No Google Contacts integration"
    impact: >
      Cannot access contact names, organizations, or job titles from
      Google Contacts. Sender names are derived from email addresses.
    workaround: >
      contact_intelligence.intensity provides relationship strength.
      Sender names from email headers are usually accurate for person senders.

  - gap: "Sender history capped at 50 threads per sender"
    impact: "Gmail API returns max 50 results per search. Very frequent senders may show 50 but have more."
    workaround: "Treat 50 as 'at least 50' — the sender is definitely frequent."

  - gap: "Trello task matching is keyword-based, not semantic"
    impact: "May miss relevant tasks or match irrelevant ones"
    workaround: "Always check match_reason. Single common-word matches are unreliable."

  - gap: "Calendar conflict detection is not time-aware"
    impact: "Returns potential overlaps without verifying actual time conflicts"
    workaround: "Flag calendar conflicts as 'potential' and suggest user verification"

  - gap: "Sender name derived from email address for automated senders"
    impact: "Names like 'Do Not Reply' or 'Noreply' are not useful"
    workaround: "For automated senders, use the email domain as the sender identifier"
