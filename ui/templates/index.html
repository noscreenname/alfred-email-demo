<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Alfred — data contract transparency demo</title>
  <link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body data-first-id="{{ first_id }}">
  <header class="topbar">
    <div class="brand">ALFRED <span class="tagline">data contract transparency demo</span></div>
    <nav>
      <a class="link" href="/log">action log</a>
      <button type="button" id="refresh-btn" class="link-btn">refresh</button>
    </nav>
  </header>

  <main class="layout">
    <section class="col inbox">
      <h2>Inbox <span class="count">{{ inbox|length }}</span></h2>
      <ul id="inbox-list">
        {% for e in inbox %}
        <li class="inbox-row" data-id="{{ e.message_id }}">
          <div class="sender">{{ e.from_name }}</div>
          <div class="subject">{{ e.subject }}</div>
          <div class="meta">{{ e.received_at }}</div>
        </li>
        {% endfor %}
      </ul>
    </section>

    <section class="main-area">
      <div id="email-detail">
        <div class="placeholder">Select an email to compare how it is handled across four maturity levels.</div>
      </div>
      <div id="comparison-grid" class="comparison-grid"></div>
    </section>
  </main>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
